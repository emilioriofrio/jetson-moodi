camera_device: /dev/video0
camera_index: 0
camera_type: usb
enabled_modules:
- A
- B
- C
fps: 30
fusion:
  cooldown_down: 1
  cooldown_up: 4
  debug: false
  required_modules: 2
height: 720
modA_backends_order:
- mediapipe
modA_ema_alpha: 0.30
modA_hysteresis_margin: 1.5
modA_min_gap_for_switch: 4.0
modA_mtcnn_max_side: 720
modA_mtcnn_min_face: 20
modA_mtcnn_steps:
- 0.6
- 0.7
- 0.8
modA_roi_expand: 1.6
modA_roi_track_ticks: 0
modA_valence_extra_gap: 1.0
modA_use_clahe: true
modA_clahe_clip: 1.2
modulo_b:
  N_FRAMES: 10
  PRED_THRESH: 0.5
  SMOOTH_WINDOW: 6
  labels_map_path: dataset_vectores_v3/labels_map_v3.txt
  model_path: resultados_modb_v3/modelo_modb_v3.keras
  quality_pose_thr: 0.35
  stale_frames: 20
modulo_c:
  analyze_every: 1
  bilstm_path: moduloC_dataset/vectores_numpy/resultados_entrenamiento/bilstm_mejor_modelo.pth
  detect_every: 3
  detectron_score_thr: 0.7
  label_map_path: moduloC_dataset/vectores_numpy/label_map.json
  min_person_ratio: 0.15
  seq_len: 11
  stale_ticks: 30
  use_gpu: true
  vgg_input:
  - 224
  - 224
prefer_mjpg: true
queues_maxsize: 5
reporter:
  method: majority
  output_jsonl: resultados/estres_resumen.jsonl
  print_console: true
  step_secs: 5
  thresholds:
    low: 0.75
    med: 1.75
  window_secs: 20
thresholds:
  face_timeout_ticks: 3
  pred_conf: 0.55
  quality_pose: 0.35
  stale_frames: 20
tick_size: 10
weights:
  A: 0.35
  B: 0.35
  C: 0.30
width: 960
